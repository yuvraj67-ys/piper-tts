<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piper TTS Web UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const modelsData = {{ models | tojson }};
        
        function updateModels() {
            const lang = document.getElementById("language").value;
            const modelSelect = document.getElementById("model");
            modelSelect.innerHTML = "";
            modelsData[lang].forEach(model => {
                let opt = document.createElement("option");
                opt.value = model;
                opt.textContent = model;
                modelSelect.appendChild(opt);
            });
        }

        async function generateAudio() {
            const btn = document.getElementById("generateBtn");
            btn.innerText = "Generating... Please Wait";
            btn.disabled = true;

            const text = document.getElementById("text").value;
            const model = document.getElementById("model").value;

            const res = await fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text, model})
            });

            const data = await res.json();
            if(data.success) {
                loadFiles();
            } else {
                alert("Error: " + data.error);
            }
            
            btn.innerText = "Generate Audio";
            btn.disabled = false;
        }

        async function loadFiles() {
            const res = await fetch('/files');
            const data = await res.json();
            const list = document.getElementById("fileList");
            list.innerHTML = "";

            data.files.forEach(file => {
                list.innerHTML += `
                    <div class="bg-gray-100 p-3 rounded-lg flex flex-col gap-2 mb-3 shadow">
                        <span class="font-semibold text-gray-700">${file}</span>
                        <audio controls class="w-full">
                            <source src="/static/outputs/${file}" type="audio/wav">
                        </audio>
                        <div class="flex gap-2">
                            <a href="/static/outputs/${file}" download class="bg-green-500 text-white px-3 py-1 rounded text-sm w-1/2 text-center">💾 Save/Download</a>
                            <button onclick="deleteFile('${file}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm w-1/2">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        async function deleteFile(filename) {
            if(confirm("Are you sure you want to delete this audio?")) {
                await fetch('/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({filename})
                });
                loadFiles();
            }
        }

        window.onload = () => {
            updateModels();
            loadFiles();
        };
    </script>
</head>
<body class="bg-gray-200 p-4 font-sans pb-20">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">🎙️ Piper TTS UI</h1>
        
        <label class="block mb-2 font-semibold">Select Language:</label>
        <select id="language" onchange="updateModels()" class="w-full p-2 border rounded mb-4 bg-gray-50">
            {% for lang in models.keys() %}
                <option value="{{ lang }}">{{ lang }}</option>
            {% endfor %}
        </select>

        <label class="block mb-2 font-semibold">Select Voice Model:</label>
        <select id="model" class="w-full p-2 border rounded mb-4 bg-gray-50"></select>

        <label class="block mb-2 font-semibold">Enter Text / Script:</label>
        <textarea id="text" rows="6" class="w-full p-2 border rounded mb-4 bg-gray-50" placeholder="Type or paste your script here... No character limit!"></textarea>

        <button id="generateBtn" onclick="generateAudio()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-300">
            Generate Audio
        </button>
    </div>

    <div class="max-w-md mx-auto mt-6 bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4 border-b pb-2">📂 Generated Audios</h2>
        <div id="fileList" class="flex flex-col">
            <!-- Files will appear here -->
        </div>
    </div>
</body>
</html>
